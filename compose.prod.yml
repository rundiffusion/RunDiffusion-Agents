services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.4@sha256:06ddf61ee653caf4f4211a604e657f084f4727f762c16f826c97aafbefcb279e}
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "${TRAEFIK_BIND_ADDRESS:-127.0.0.1}:${TRAEFIK_HTTP_PORT:-38080}:80"
    volumes:
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic/00-static.yml:ro
      - ${DATA_ROOT}/traefik/dynamic/generated-tenants.yml:/etc/traefik/dynamic/10-tenants.yml:ro
    networks:
      ingress:
        aliases:
          - traefik
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  ingress:
    name: ${TRAEFIK_NETWORK:-rundiffusion-public}
