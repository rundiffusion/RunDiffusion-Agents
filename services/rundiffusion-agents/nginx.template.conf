worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  error_log /dev/stderr info;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 0;

  # Rate limiting for authenticated endpoints (brute-force protection)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
  limit_req_status 429;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen __PUBLIC_PORT__;
    server_name _;
    set $terminal_enabled __TERMINAL_ENABLED__;
    set $hermes_enabled __HERMES_ENABLED__;
    set $hermes_webui_enabled __HERMES_WEBUI_ENABLED__;
    set $codex_enabled __CODEX_ENABLED__;
    set $claude_enabled __CLAUDE_ENABLED__;
    set $gemini_enabled __GEMINI_ENABLED__;
    set $pi_enabled __PI_ENABLED__;

    location = /healthz {
      add_header Cache-Control "no-store";
      root /tmp;
      default_type text/plain;
      try_files /openclaw-gateway-ready =503;
    }

    error_page 503 = @openclaw_not_ready;

    location @openclaw_not_ready {
      default_type text/plain;
      return 503 "starting\n";
    }

    location = /filebrowser {
      include /tmp/openclaw-gateway-terminal-auth.inc;
      absolute_redirect off;
      return 302 /filebrowser/;
    }

    location ^~ /filebrowser/ {
      include /tmp/openclaw-gateway-terminal-auth.inc;
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://127.0.0.1:__FILEBROWSER_INTERNAL_PORT__;
      proxy_http_version 1.1;
      proxy_set_header Authorization "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-User "filebrowser-$remote_user";
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header Content-Security-Policy;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Content-Security-Policy "frame-ancestors 'self'" always;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location = __DASHBOARD_BASE_URL__ {
      include /tmp/openclaw-gateway-terminal-auth.inc;
      absolute_redirect off;
      return 302 __DASHBOARD_BASE_URL__/;
    }

    location ^~ __DASHBOARD_BASE_URL__/ {
      include /tmp/openclaw-gateway-terminal-auth.inc;
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://127.0.0.1:__DASHBOARD_INTERNAL_PORT__;
      proxy_http_version 1.1;
      proxy_set_header Authorization "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-User $remote_user;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location ^~ __DASHBOARD_API_BASE_URL__/ {
      include /tmp/openclaw-gateway-terminal-auth.inc;
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://127.0.0.1:__DASHBOARD_INTERNAL_PORT__;
      proxy_http_version 1.1;
      proxy_set_header Authorization "";
